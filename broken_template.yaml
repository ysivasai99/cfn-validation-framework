AWSTemplateFormatVersion: '2010-09-09'
Description: LocalStack Community - Fully Deployable Services

Resources:

  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 999.999.0.0/16

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-99z

  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: INVALID$$BUCKET

  MyQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 99999

  MyTopic:
    Type: AWS::SNS::Topic

  MyFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python0.1
      Handler: index.handler
      Role: !Ref NonExistentRole
      Code:
        ZipFile: |
          def handler(event, context):
            return 'Hello'

  MyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: INVALID_MODE
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: INVALID_TYPE
      KeySchema:
        - AttributeName: id
          KeyType: INVALID_KEY

  MyStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 0
      StreamModeDetails:
        StreamMode: INVALID_MODE

  MySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      GenerateSecretString:
        PasswordLength: 0

  MyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Type: INVALID_TYPE
      Value: my-value

  MyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '1999-01-01'
        Statement:
          - Effect: INVALID_EFFECT
            Principal:
              Service: INVALID_SERVICE
            Action: sts:AssumeRole

  MyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: my-alarm
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: INVALID_STAT
      Period: 99999
      EvaluationPeriods: 0
      Threshold: 80
      ComparisonOperator: INVALID_OP

  MyStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineType: INVALID_TYPE
      RoleArn: !Ref NonExistentRole
      DefinitionString: |
        {
          "StartAt": "Hello",
          "States": {
            "Hello": {"Type": "INVALID_TYPE", "End": true}
          }
        }

  MyUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      MfaConfiguration: INVALID_MFA

Outputs:
  BucketName:
    Value: !Ref MyBucket
  QueueUrl:
    Value: !Ref MyQueue
