AWSTemplateFormatVersion: '2010-09-09'
Description: IAM - Invalid principal
Resources:
  MyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: my-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: INVALID_SERVICE
            Action: sts:AssumeRole