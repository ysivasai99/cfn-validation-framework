AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda + DynamoDB - Invalid billing mode
Resources:
  MyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: my-table
      BillingMode: INVALID_BILLING_MODE
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: INVALID_TYPE
      KeySchema:
        - AttributeName: id
          KeyType: HASH
  MyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: my-function
      Runtime: python3.9
      Handler: index.handler
      Role: arn:aws:iam::123456789012:role/lambda-role
      Code:
        ZipFile: |
          def handler(event, context):
            return 'Hello'