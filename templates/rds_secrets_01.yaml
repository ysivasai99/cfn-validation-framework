AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      GenerateSecretString:
        PasswordLength: 0
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
  MySubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-99z
  MySubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: ap-invalid-1z
  MyDBSubnet:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: DB subnet
      SubnetIds: [!Ref MySubnet1, !Ref MySubnet2]
  MyDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.invalid.type
      Engine: invalid-engine
      MasterUsername: admin
      MasterUserPassword: hardcoded_password
      AllocatedStorage: 99999
      DBSubnetGroupName: !Ref MyDBSubnet